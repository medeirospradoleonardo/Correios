trigger: none

resources:
  webhooks:
    - webhook: Rollup
      connection: Rollup

pool:
  name: Default

steps:
  - checkout: self

  - script: |
      echo Agent:
      echo %COMPUTERNAME%
      node --version
      npm --version
    displayName: 'Validate Agent'

  - script: |
      echo Installing dependencies...
      npm install
    displayName: 'Install Dependencies'

  - powershell: |
      Write-Host "Webhook Payload:"
      Write-Host $env:WEBHOOK_PAYLOAD
    displayName: 'Debug Payload'
    env:
      WEBHOOK_PAYLOAD: '${{ convertToJson(resources.webhooks.Rollup) }}'

  - script: |
      node scripts/rollup-story-hours.js
    displayName: 'Rollup Story Hours'
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      AZDO_ORG_URL: $(System.CollectionUri)
      AZDO_PROJECT: $(System.TeamProject)
      WEBHOOK_PAYLOAD: '${{ convertToJson(resources.webhooks.Rollup) }}'
